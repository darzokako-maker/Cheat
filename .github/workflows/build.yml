name: Build Safe Web Monitor

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install
      run: pip install pymem flask pyinstaller
    - name: Secure Build
      run: |
        pyinstaller --onefile --noconsole --uac-admin --name "SysMonitor" main.py
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Safe-Web-Radar
        path: dist/SysMonitor.exe
        
