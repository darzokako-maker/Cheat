name: Remote Monitor Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install opencv-python Flask pyautogui mss numpy pyinstaller

    - name: Build to EXE
      run: |
        pyinstaller --onefile --noconsole main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControl_App
        path: dist/main.exe
        
